<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Checklist Funilaria">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff355a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Checklist Funilaria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--brand:#ff355a;--brand-l:#fff0f3;--brand-d:#c9203f;--or:#E8630A;--or-l:#FFF3EB;--ink:#111;--ink2:#3D3730;--ink3:#888;--rule:#E8E2DC;--bg:#F8F5F5;--wh:#fff;--gr:#1A7A3C;--gr-l:#E8F5EE;--rd:#C0281E;--rd-l:#FCECEA;--am:#7C5000;--am-l:#FFF7E0;--pu:#5B21B6;--pu-l:#EDE9FE;--bl:#1565C0;--bl-l:#E8F4FD;--sh:0 1px 5px rgba(0,0,0,.09)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{background:#ff355a;padding:14px 16px 10px;flex-shrink:0}
.tb1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:52px;height:52px;border-radius:10px;background:#ff355a;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:18px;color:#fff;font-weight:700;flex-shrink:0;border:1.5px solid rgba(255,255,255,.3)}
.bn{font-family:'Sora',sans-serif;font-size:16px;color:#fff;font-weight:700}
.bs{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px}
.ptag{font-family:'DM Mono',monospace;font-size:14px;background:rgba(255,255,255,.2);color:#fff;padding:7px 12px;border-radius:8px;letter-spacing:.1em;font-weight:700;min-width:68px;text-align:center;border:1.5px solid rgba(255,255,255,.4)}
.pb-wrap{height:4px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.pb-fill{height:100%;background:#fff;border-radius:2px;transition:width .3s}
.tb3{display:flex;justify-content:space-between;margin-top:7px}
.tbs{font-size:12px;color:rgba(255,255,255,.9);font-family:'DM Mono',monospace;letter-spacing:.05em;text-transform:uppercase;font-weight:500}
.tbp{font-size:12px;color:#fff;font-family:'DM Mono',monospace;font-weight:600}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pg{padding:16px 16px 20px}
.bnav{background:#fff;border-top:1px solid var(--rule);padding:12px 16px 20px;display:flex;gap:10px;box-shadow:0 -2px 14px rgba(0,0,0,.07);flex-shrink:0}
.bnav.hidden{display:none}
.nb{flex:1;padding:16px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;-webkit-user-select:none;user-select:none}
.nb:active{opacity:.75}
.nb-bk{background:var(--bg);color:var(--ink2);border:1.5px solid var(--rule)}
.nb-nx{background:var(--brand);color:#fff}
.nb-sd{background:var(--gr);color:#fff}
.home-wrap{padding:8px 0}
.home-title{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:6px}
.home-sub{font-size:15px;color:var(--ink3);margin-bottom:24px;line-height:1.5}
.home-btn{display:flex;align-items:center;gap:14px;background:var(--wh);border:1.5px solid var(--rule);border-radius:14px;padding:18px 20px;margin-bottom:12px;cursor:pointer;width:100%;text-align:left}
.home-btn:active{background:var(--brand-l)}
.home-btn-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.home-btn.new .home-btn-ico{background:var(--brand-l)}
.home-btn.hist .home-btn-ico{background:var(--pu-l)}
.home-btn-title{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:2px}
.home-btn-sub{font-size:13px;color:var(--ink3)}
.card{background:var(--wh);border-radius:12px;box-shadow:var(--sh);margin-bottom:14px;padding:18px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.fld{margin-bottom:14px}
.fld:last-child{margin-bottom:0}
label{display:block;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
input[type=text],input[type=date]{width:100%;background:var(--bg);border:1.5px solid var(--rule);border-radius:9px;padding:14px;font-size:17px;font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-appearance:none;transition:border-color .15s}
input:focus{outline:none;border-color:var(--brand);background:#fff}
.tec-select{width:100%;background:var(--bg);border:1.5px solid var(--rule);border-radius:9px;padding:14px;font-size:16px;font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-appearance:none;appearance:none;outline:none;cursor:pointer}
.tec-select:focus{border-color:var(--brand);background:#fff}
.ip{font-family:'DM Mono',monospace !important;font-size:22px !important;font-weight:500 !important;letter-spacing:.15em !important;text-transform:uppercase !important}
.notice{background:var(--am-l);border:1px solid #D4A843;border-radius:10px;padding:14px 16px;font-size:15px;color:var(--am);line-height:1.6}
.shdr{display:flex;align-items:center;gap:10px;background:var(--brand-l);border-left:4px solid var(--brand);border-radius:10px;padding:13px 15px;margin-bottom:14px}
.shn{font-family:'DM Mono',monospace;font-size:12px;color:var(--brand);font-weight:500;white-space:nowrap}
.sht{font-family:'Sora',sans-serif;font-size:17px;font-weight:700;color:var(--ink);flex:1}
.shp{font-family:'DM Mono',monospace;font-size:13px;color:var(--ink3);white-space:nowrap}
.itm{background:var(--wh);border-radius:12px;box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;border:2px solid transparent;transition:border-color .18s}
.itm.montado{border-color:var(--gr)}.itm.desmontado{border-color:var(--or)}
.itop{padding:15px 15px 11px;display:flex;align-items:flex-start;gap:10px}
.iref{font-family:'DM Mono',monospace;font-size:12px;color:var(--brand);font-weight:500;min-width:28px;padding-top:2px;flex-shrink:0}
.idesc{font-size:16px;font-weight:500;color:var(--ink);flex:1;line-height:1.5}
.idot{width:10px;height:10px;border-radius:50%;background:var(--rule);flex-shrink:0;margin-top:4px;transition:background .18s}
.idot.montado{background:var(--gr)}.idot.desmontado{background:var(--or)}
.sbr{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--bg)}
.sb{padding:16px 6px;border:none;background:var(--wh);cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--ink3);display:flex;flex-direction:column;align-items:center;gap:5px;border-right:1px solid var(--bg);transition:background .15s,color .15s;-webkit-user-select:none;user-select:none;min-height:60px}
.sb:last-child{border-right:none}.sb:active{opacity:.7}
.sb .ic{font-size:24px;line-height:1}
.sb.mont{background:var(--gr-l);color:var(--gr)}.sb.desm{background:var(--or-l);color:var(--or)}
.xtr{display:none;padding:13px 15px;border-top:1px solid var(--bg);background:var(--bg)}
.xtr.open{display:block}
.rec-toggle{display:flex;align-items:center;gap:12px;background:var(--wh);border-radius:10px;padding:14px 16px;margin-bottom:12px;border:1.5px solid var(--rule);cursor:pointer;transition:border-color .15s}
.rec-toggle.on{border-color:var(--pu);background:var(--pu-l)}
.rec-icon{font-size:22px;flex-shrink:0}
.rec-text{flex:1}
.rec-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px}
.rec-sub{font-size:12px;color:var(--ink3)}
.rec-toggle.on .rec-title{color:var(--pu)}
.rec-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--rule);background:var(--wh);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.rec-toggle.on .rec-check{background:var(--pu);border-color:var(--pu);color:#fff}
.comp-toggle{display:flex;align-items:center;gap:12px;background:var(--wh);border-radius:12px;padding:16px;margin-bottom:14px;border:1.5px solid var(--rule);cursor:pointer;transition:border-color .15s;box-shadow:var(--sh)}
.comp-toggle.on{border-color:var(--bl);background:var(--bl-l)}
.comp-icon{font-size:24px;flex-shrink:0}
.comp-text{flex:1}
.comp-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px}
.comp-toggle.on .comp-title{color:var(--bl)}
.comp-sub{font-size:12px;color:var(--ink3)}
.comp-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--rule);background:var(--wh);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.comp-toggle.on .comp-check{background:var(--bl);border-color:var(--bl);color:#fff}
textarea{width:100%;background:#fff;border:1.5px solid var(--rule);border-radius:9px;padding:12px 14px;font-size:16px;font-family:'DM Sans',sans-serif;color:var(--ink);resize:none;transition:border-color .15s;margin-bottom:10px}
textarea:focus{outline:none;border-color:var(--brand)}
.fotos-wrap{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.foto-thumb-wrap{position:relative;flex-shrink:0}
.foto-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;border:2px solid var(--gr);display:block}
.foto-del-btn{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:var(--rd);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}
.foto-add-btn{display:flex;align-items:center;gap:7px;background:var(--brand);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.foto-add-btn:active{background:var(--brand-d)}
.foto-obrig{font-size:12px;color:var(--rd);font-weight:600;margin-top:4px;display:none}
.foto-obrig.show{display:block}
input[type=file]{display:none}
.pc{background:var(--wh);border-radius:12px;box-shadow:var(--sh);padding:18px;margin-bottom:12px}
.pn{font-family:'DM Mono',monospace;font-size:12px;color:var(--brand);font-weight:500;margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em}
.pd{font-size:16px;font-weight:500;color:var(--ink);margin-bottom:14px;line-height:1.55}
.s4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.sbox{background:#fff;border-radius:10px;padding:14px 4px;text-align:center;box-shadow:var(--sh)}
.snum{font-family:'Sora',sans-serif;font-size:26px;font-weight:700}
.slbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-top:3px;font-family:'DM Mono',monospace}
.snum.t{color:var(--ink)}.snum.mo{color:var(--gr)}.snum.de{color:var(--or)}.snum.re{color:var(--pu)}
.ib{background:#fff;border-radius:12px;box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bg)}
.ir:last-child{border-bottom:none}
.ik{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-family:'DM Mono',monospace}
.iv{font-size:16px;font-weight:600;color:var(--ink)}
.iv.pv{font-family:'DM Mono',monospace;font-size:20px;letter-spacing:.12em}
.res-sec{margin-bottom:16px}
.res-sec-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);font-family:'DM Mono',monospace;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.res-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.res-badge.mo{background:var(--gr-l);color:var(--gr)}.res-badge.de{background:var(--or-l);color:var(--or)}.res-badge.re{background:var(--pu-l);color:var(--pu)}
.res-item{background:#fff;border-radius:10px;padding:11px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--sh)}
.res-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.res-dot.mo{background:var(--gr)}.res-dot.de{background:var(--or)}.res-dot.re{background:var(--pu)}
.res-sec2{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-bottom:2px}
.res-desc{font-size:14px;font-weight:500;color:var(--ink)}
.wn{background:var(--am-l);border:1px solid #D4A843;border-radius:10px;padding:14px 16px;font-size:15px;color:var(--am);line-height:1.6;margin-bottom:12px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--brand);font-size:15px;font-weight:600;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;margin-bottom:14px}
.hist-filters{margin-bottom:12px}
.hist-search-wrap{display:flex;align-items:center;background:var(--wh);border:1.5px solid var(--rule);border-radius:10px;padding:0 14px;margin-bottom:10px;box-shadow:var(--sh)}
.hist-search-icon{font-size:16px;margin-right:8px;flex-shrink:0}
.hist-search-input{flex:1;border:none;background:transparent;font-size:16px;font-family:'DM Sans',sans-serif;color:var(--ink);padding:13px 0;outline:none}
.hist-search-input::placeholder{color:var(--ink3)}
.hist-date-row{display:flex;gap:8px;align-items:flex-end}
.hist-date-group{flex:1}
.hist-date-group label{display:block;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.hist-date-input{width:100%;background:var(--wh);border:1.5px solid var(--rule);border-radius:9px;padding:11px 10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-appearance:none;outline:none}
.hist-date-input:focus{border-color:var(--brand)}
.hist-clear-btn{background:var(--rule);border:none;border-radius:9px;padding:11px 14px;font-size:14px;cursor:pointer;color:var(--ink3);flex-shrink:0;font-family:'DM Sans',sans-serif;font-weight:600}
.hist-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);margin-bottom:8px;letter-spacing:.04em}
.hist-stats{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.hist-stat{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace}
.hist-stat.de{background:var(--or-l);color:var(--or)}
.hist-stat.re{background:var(--pu-l);color:var(--pu)}
.hist-stat.ok{background:var(--gr-l);color:var(--gr)}
.hist-stat.comp{background:var(--bl-l);color:var(--bl)}
.hist-item{background:var(--wh);border-radius:12px;box-shadow:var(--sh);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer}
.hist-item:active{background:var(--bg)}
.hist-placa{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--ink);letter-spacing:.1em}
.hist-info{flex:1}
.hist-meta{font-size:13px;color:var(--ink3);margin-top:2px}
.hist-badge{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--gr-l);color:var(--gr);font-weight:600;font-family:'DM Mono',monospace;white-space:nowrap}
.hist-arrow{color:var(--ink3);font-size:18px}
.hist-empty{text-align:center;padding:40px 20px;color:var(--ink3);font-size:15px}
.det-section{background:var(--wh);border-radius:12px;box-shadow:var(--sh);overflow:hidden;margin-bottom:12px}
.det-sec-hdr{background:var(--ink);color:#fff;padding:10px 14px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.det-item{padding:11px 14px;border-bottom:1px solid var(--bg);display:flex;align-items:flex-start;gap:10px}
.det-item:last-child{border-bottom:none}
.det-ref{font-family:'DM Mono',monospace;font-size:11px;color:var(--brand);min-width:26px;flex-shrink:0;padding-top:2px}
.det-desc{font-size:14px;color:var(--ink);font-weight:500}
.det-status{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.det-status.montado{background:var(--gr-l);color:var(--gr)}
.det-status.desmontado{background:var(--or-l);color:var(--or)}
.det-status.empty{background:var(--rule);color:var(--ink3)}
.det-rec{font-size:11px;color:var(--pu);font-weight:600;margin-top:3px}
.det-obs{font-size:12px;color:var(--ink3);font-style:italic;margin-top:2px}
.det-foto-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--brand);font-weight:600;text-decoration:none;margin-top:4px;margin-right:8px}
.comp-badge-det{display:inline-flex;align-items:center;gap:6px;background:var(--bl-l);color:var(--bl);border:1px solid #90CAF9;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:600;margin-bottom:14px}
.modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:24px}
.modal-overlay.on{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:28px 24px;max-width:320px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-icon{font-size:40px;text-align:center;margin-bottom:14px}
.modal-msg{font-size:17px;font-weight:500;color:var(--ink);text-align:center;line-height:1.6;margin-bottom:24px}
.modal-btn{width:100%;padding:16px;border-radius:12px;border:none;background:var(--brand);color:#fff;font-size:17px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.modal-btn:active{background:var(--brand-d)}
.ls{display:none;position:fixed;inset:0;z-index:9998;background:rgba(10,10,10,.85);flex-direction:column;align-items:center;justify-content:center;gap:20px}
.ls.on{display:flex}
.sp{width:50px;height:50px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lm{font-family:'DM Mono',monospace;font-size:14px;color:rgba(255,255,255,.65);letter-spacing:.05em}
.sw{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:32px 20px;text-align:center}
.si{font-size:72px;margin-bottom:20px}
.st{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;color:var(--ink);margin-bottom:10px}
.ss{font-size:15px;color:var(--ink3);max-width:300px;line-height:1.7}
.sid{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3);margin-top:20px;padding:10px 18px;background:var(--rule);border-radius:8px}
.snw{margin-top:28px;background:var(--brand);color:#fff;border:none;border-radius:12px;padding:16px 36px;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
/* REC OPTS */
.rec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-family:'DM Mono',monospace;margin-bottom:8px}
.rec-opts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.rec-opt{flex:1;min-width:80px;padding:10px 6px;border-radius:10px;border:1.5px solid var(--rule);background:var(--wh);font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;transition:all .15s;line-height:1.3}
.rec-opt:active{opacity:.7}
.rec-opt.troca.on{background:var(--rd-l);border-color:var(--rd);color:var(--rd)}
.rec-opt.recuperacao.on{background:var(--pu-l);border-color:var(--pu);color:var(--pu)}
.rec-opt.celula.on{background:var(--bl-l);border-color:var(--bl);color:var(--bl)}
/* EDIT */
.edit-btn{display:inline-flex;align-items:center;gap:6px;background:var(--am-l);color:var(--am);border:1.5px solid #D4A843;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px}
.edit-btn:active{opacity:.7}
/* COMP FILTER */

async function loginGoogle() {

async function fazerLogout() {
  await fetch(SUPABASE_URL + '/auth/v1/signout', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + (_session ? _session.access_token : SUPABASE_KEY) }
  }).catch(function(){});
  localStorage.removeItem('sb_session');

  ST.td = '';
  renderLogin();
}

async function tentarRenovarSessao(refreshToken) {
  var res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refreshToken })
  });
  if (!res.ok) return null;
  var data = await res.json();
  return { access_token: data.access_token, refresh_token: data.refresh_token };
}

async function iniciarSessao() {
  // 1. Verifica hash da URL (retorno do OAuth)
  var hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    var params = new URLSearchParams(hash.replace('#', ''));
    _session = {
      access_token:  params.get('access_token'),
      refresh_token: params.get('refresh_token')
    };
    localStorage.setItem('sb_session', JSON.stringify(_session));
    history.replaceState(null, '', window.location.pathname);
  }

  // 2. Tenta recuperar do localStorage
  if (!_session) {
    try { _session = JSON.parse(localStorage.getItem('sb_session')); } catch(e) { _session = null; }
  }

  if (!_session || !_session.access_token) { renderLogin(); return; }

  // 3. Valida o token atual
  var userRes = await fetch(SUPABASE_URL + '/auth/v1/user', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + _session.access_token }
  });

  // 4. Se expirou, tenta renovar com refresh_token
  if (!userRes.ok && _session.refresh_token) {
    var nova = await tentarRenovarSessao(_session.refresh_token);
    if (nova) {
      _session = nova;
      localStorage.setItem('sb_session', JSON.stringify(_session));
      userRes = await fetch(SUPABASE_URL + '/auth/v1/user', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + _session.access_token }
      });
    } else {
      localStorage.removeItem('sb_session');
      _session = null;
      renderLogin();
      return;
    }
  }

  if (!userRes.ok) { localStorage.removeItem('sb_session'); _session = null; renderLogin(); return; }

  var user  = await userRes.json();
  var email = (user.email || '').toLowerCase();

  // 5. Verifica se o e-mail está na tabela de técnicos
  var tecs = await fetch(API + '/tecnicos?select=id,nome,email&email=eq.' + encodeURIComponent(email), {
    headers: getAuthHeaders()
  }).then(function(r){ return r.json(); }).catch(function(){ return []; });

  if (!tecs || !tecs[0]) {
    // Não é técnico — verifica se é domínio Kovi para acesso como leitor
    if (email.endsWith('@kovi.com.br')) {
      iniciarSessaoLeitor(user);
      return;
    }
    localStorage.removeItem('sb_session');
    _session = null;
    renderLogin();
    setTimeout(function(){ document.getElementById('login-error').classList.add('show'); }, 100);
    return;
  }

  _tecnico = tecs[0];
  ST.td    = _tecnico.nome;
  _modo    = 'tecnico';
  mostrarApp();
}

async function iniciarSessaoLeitor(user) {
  // Qualquer @kovi.com.br que não é técnico entra como leitor
  var nome = (user.user_metadata && user.user_metadata.full_name) || user.email || 'Usuário';
  _tecnico = { id: null, nome: nome, email: user.email };
  _modo    = 'leitor';
  mostrarApp();
}

async function sbUpdate(table, id, body) {
  var h = Object.assign({}, getAuthHeaders(), { 'Prefer': 'return=representation' });
  var res = await fetch(API + '/' + table + '?id=eq.' + id, {
    method: 'PATCH', headers: h, body: JSON.stringify(body)
  });
  if (!res.ok) { var e = await res.json().catch(function(){ return {}; }); throw new Error(e.message || res.statusText); }
  return res.json();
}

async function sbSelect(table, params) {
  var url = API + '/' + table + (params ? '?' + params : '');
  var res = await fetch(url, { headers: getAuthHeaders() });
  if (!res.ok) { var e = await res.json().catch(function(){ return {}; }); throw new Error(e.message || res.statusText); }
  return res.json();
}

async function sbInsert(table, body) {
  var h = Object.assign({}, getAuthHeaders(), { 'Prefer': 'return=representation' });
  var res = await fetch(API + '/' + table, { method: 'POST', headers: h, body: JSON.stringify(body) });
  if (!res.ok) { var e = await res.json().catch(function(){ return {}; }); throw new Error(e.message || res.statusText); }
  var data = await res.json();
  return Array.isArray(data) ? data[0] : data;
}

async function uploadFoto(b64, path) {
  var fetchRes = await fetch(b64);
  var blob = await fetchRes.blob();
  var url = SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + path;
  var token = _session ? _session.access_token : SUPABASE_KEY;
  var res = await fetch(url, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'image/jpeg' },
    body: blob
  });
  if (!res.ok) { var e = await res.json().catch(function(){ return {}; }); throw new Error('Upload: ' + (e.error || res.statusText)); }
  return { storagePath: path, url: SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + path };
}

  else if(SECS.indexOf(s)>=0) rSec(p,s);
  else if(s==='pecas')       rPecas(p);
  else                        rResumo(p);
  uiSync();
}
function uiTop(step,pct,placa){
  document.getElementById('tbs').textContent  = step;
  document.getElementById('tbp').textContent  = pct;
  document.getElementById('ptag').textContent = placa;
  document.getElementById('pf').style.width   = pct || '0%';
}
function setNav(show, isSend){
  var n = document.getElementById('bnav');
  if(!show){ n.classList.add('hidden'); return; }
  n.classList.remove('hidden');
  var nb = document.getElementById('bnx');

  else       { nb.className='nb nb-nx'; nb.textContent='Proximo'; }

function uiSync(){
  var s   = STEPS[ST.step];
  var pct = Math.round(ndone()/CAT.length*100)+'%';
  var nm  = {hdr:'IDENTIFICACAO',Frente:'FRENTE',Lateral:'LATERAL',Traseira:'TRASEIRA',Interna:'INTERNA',pecas:'PECAS REMOVIDAS',resumo:'RESUMO'};
  uiTop(nm[s]||s, pct+' concluido', (ST.placa||'-').toUpperCase());
  setNav(true, s==='resumo');
}

function rHistLoading(p){

    +'<button class="back-link" style="margin-bottom:0" onclick="voltarHome()">&#x2190; Voltar</button>'
    +'<button onclick="verHistorico()" style="background:none;border:1.5px solid var(--rule);color:var(--ink3);font-size:13px;font-family:\'DM Sans\',sans-serif;cursor:pointer;display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px">&#x1F504; Atualizar</button>'
  +'</div>'
  +'<div style="text-align:center;padding:30px;color:#888;font-size:15px">Carregando...</div>';

  (async function(){
    try {
      var cls = await sbSelect('checklists',
        'select=id,placa,data,tem_complemento,created_at,tecnicos(nome)&order=created_at.desc');

      if(!cls || cls.length===0){ rHistData(p,[]); return; }

      var ids = cls.map(function(c){ return c.id; }).join(',');
      var itens = await sbSelect('checklist_itens',
        'select=checklist_id,desmontado,recuperacao,zona&checklist_id=in.('+ids+')&zona=neq.Pecas');

      var stats = {};
      (itens||[]).forEach(function(it){
        if(!stats[it.checklist_id]) stats[it.checklist_id]={desm:0,rec:0,total:0};
        stats[it.checklist_id].total++;
        if(it.desmontado)   stats[it.checklist_id].desm++;
        if(it.recuperacao)  stats[it.checklist_id].rec++;
      });

      var checklists = cls.map(function(c){
        return {
          ID: c.id,
          Placa: c.placa,
          Data: c.data ? c.data.split('-').reverse().join('/') : '',
          Tecnico_Desmontagem: c.tecnicos ? c.tecnicos.nome : '',
          Status: 'Concluido',
          _complemento: c.tem_complemento,
          _desm:  (stats[c.id]||{}).desm  || 0,
          _rec:   (stats[c.id]||{}).rec   || 0,
          _total: (stats[c.id]||{}).total || 0
        };
      });

      rHistData(p, checklists);
    } catch(e) {
      p.innerHTML='<button class="back-link" onclick="voltarHome()">&#x2190; Voltar</button>'
        +'<div class="hist-empty">Erro ao carregar: '+e.message+'</div>';
    }
  })();
}

function rHistData(p, checklists){
  _allChecklists = checklists || [];
  p.innerHTML='<button class="back-link" onclick="voltarHome()">&#x2190; Voltar</button>'
    +'<div class="hist-filters">'
      +'<div class="hist-search-wrap"><span class="hist-search-icon">&#x1F50D;</span><input class="hist-search-input" type="text" id="hist-search" placeholder="Buscar por placa ou tecnico..."></div>'
      +'<button class="comp-filter-btn'+((_filtroComplemento)?' on':'')+'" id="btn-comp" onclick="toggleFiltroComplemento()">&#x1F527; Apenas com complemento</button>'
      +'<div class="hist-date-row"><div class="hist-date-group"><label>De</label><input class="hist-date-input" type="date" id="hist-de"></div><div class="hist-date-group"><label>Ate</label><input class="hist-date-input" type="date" id="hist-ate"></div><button class="hist-clear-btn" onclick="limparFiltros()">&#x2715;</button></div>'
    +'</div>'
    +'<div id="hist-list"></div>';
  document.getElementById('hist-search').addEventListener('input',filtrarHist);
  document.getElementById('hist-de').addEventListener('change',filtrarHist);
  document.getElementById('hist-ate').addEventListener('change',filtrarHist);
  renderHistList(_allChecklists);
}
function toggleFiltroComplemento(){
  _filtroComplemento = !_filtroComplemento;
  var btn = document.getElementById('btn-comp');
  if(btn) btn.className = 'comp-filter-btn' + (_filtroComplemento ? ' on' : '');
  filtrarHist();
}
function filtrarHist(){
  var s=document.getElementById('hist-search'),de=document.getElementById('hist-de'),ate=document.getElementById('hist-ate');
  if(!s) return;
  var q=s.value.toUpperCase().trim(),dv=de?de.value:'',av=ate?ate.value:'';
  var filtered=_allChecklists.filter(function(c){
    if(_filtroComplemento && !c._complemento) return false;
    var texto=((c.Placa||'')+' '+(c.Tecnico_Desmontagem||'')).toUpperCase();
    if(q&&texto.indexOf(q)<0) return false;
    if(dv||av){ var parts=(c.Data||'').split('/'); if(parts.length===3){ var iso=parts[2]+'-'+parts[1]+'-'+parts[0]; if(dv&&iso<dv) return false; if(av&&iso>av) return false; } }
    return true;
  });
  renderHistList(filtered);
}
function limparFiltros(){
  var s=document.getElementById('hist-search'); if(s) s.value='';
  var d=document.getElementById('hist-de'); if(d) d.value='';
  var a=document.getElementById('hist-ate'); if(a) a.value='';
  renderHistList(_allChecklists);
}
function renderHistList(list){
  var wrap=document.getElementById('hist-list'); if(!wrap) return;
  if(!list||list.length===0){ wrap.innerHTML='<div class="hist-empty">Nenhum resultado encontrado.</div>'; return; }
  var html='<div class="hist-count">'+list.length+' checklist'+(list.length!==1?'s':'')+'</div>';
  list.forEach(function(entry){
    var id=(entry.ID||'').replace(/'/g,''), placa=(entry.Placa||'-').replace(/'/g,'');
    var desm=entry._desm||0, rec=entry._rec||0, total=entry._total||0;
    html+='<div class="hist-item" onclick="verDetalhe(\''+id+'\',\''+placa+'\')"><div class="hist-info"><div class="hist-placa">'+placa+'</div><div class="hist-meta">'+(entry.Data||'')+' &middot; '+(entry.Tecnico_Desmontagem||'')+'</div><div class="hist-stats">';
    if(desm>0)              html+='<span class="hist-stat de">'+desm+' desmontada'+(desm!==1?'s':'')+'</span>';
    if(rec>0)               html+='<span class="hist-stat re">'+rec+' recuperacao</span>';
    if(desm===0&&total>0)   html+='<span class="hist-stat ok">Todas nao desmontadas</span>';
    if(entry._complemento)  html+='<span class="hist-stat comp">&#x1F527; Complemento</span>';
    html+='</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0"><span class="hist-badge">Concluido</span><span class="hist-arrow">&#x203A;</span></div></div>';
  });
  wrap.innerHTML=html;
}

function rDetData(p, res){
  var c=res.checklist, itens=res.itens, pecas=res.pecas;
  var mo=0,de=0,flagCount=0;
  var flagLabels={'troca':'&#x1F504; Troca','recuperacao':'&#x1F9F0; Recuperacao','celula':'&#x1F3ED; Celula'};
  var flagColors={'troca':'var(--bl)','recuperacao':'var(--pu)','celula':'var(--gr)'};
  itens.forEach(function(it){ if(it.Status==='montado') mo++; else if(it.Status==='desmontado'){ de++; if(it.TipoFlag) flagCount++; } });
  var temComplemento=isRec(c.Complemento);
  var podeEditar = _modo === 'tecnico'
    && _tecnico && c._tecnicoId === _tecnico.id
    && c._editado === false
    && _ultimoChecklist && _ultimoChecklist.id === c._rawId;
  var h='<button class="back-link" onclick="verHistorico()">&#x2190; Historico</button>';
  if(podeEditar) h+='<button style="display:flex;align-items:center;gap:8px;background:var(--am-l);color:var(--am);border:1.5px solid #D4A843;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;width:100%;margin-bottom:14px" onclick="carregarParaEditar(\''+c._rawId+'\')">&#x270F;&#xFE0F; Editar este checklist (apenas uma vez)</button>';
  if(temComplemento) h+='<div class="comp-badge-det">&#x1F527; Este carro teve complemento</div>';
  h+='<div class="s4"><div class="sbox"><div class="snum t">'+itens.length+'</div><div class="slbl">Total</div></div><div class="sbox"><div class="snum mo">'+mo+'</div><div class="slbl">Nao desm.</div></div><div class="sbox"><div class="snum de">'+de+'</div><div class="slbl">Desmontado</div></div><div class="sbox"><div class="snum re">'+flagCount+'</div><div class="slbl">Com flag</div></div></div>';
  h+='<div class="ib"><div class="ir"><span class="ik">Placa</span><span class="iv pv">'+(c.Placa||'-')+'</span></div><div class="ir"><span class="ik">Data</span><span class="iv">'+(c.Data||'-')+'</span></div><div class="ir"><span class="ik">Tecnico</span><span class="iv">'+(c.Tecnico_Desmontagem||'-')+'</span></div><div class="ir"><span class="ik">Complemento</span><span class="iv" style="color:'+(temComplemento?'var(--bl)':'var(--ink3)')+'">'+(temComplemento?'Sim':'Nao')+'</span></div></div>';
  ['Frente','Lateral','Traseira','Interna'].forEach(function(sec){
    var si=itens.filter(function(it){ return it.Secao===sec; }); if(!si.length) return;
    var ms=si.filter(function(i){ return i.Status==='montado'; }).length;
    var ds=si.filter(function(i){ return i.Status==='desmontado'; }).length;
    h+='<div class="det-section"><div class="det-sec-hdr"><span>'+sec.toUpperCase()+'</span><span style="font-size:10px;opacity:.6">'+ms+' nao desm. &middot; '+ds+' desmontados</span></div>';
    si.forEach(function(it){
      var st=it.Status||'', stCls=st==='montado'?'montado':st==='desmontado'?'desmontado':'empty';
      var stLbl=st==='montado'?'Nao desmontado':st==='desmontado'?'Desmontado':'-';
      var fotos=(it.Foto||'').split('|').filter(function(u){ return u.trim(); });
      var flagHtml = it.TipoFlag
        ? '<div style="font-size:11px;font-weight:600;color:'+flagColors[it.TipoFlag]+';margin-top:3px">'+flagLabels[it.TipoFlag]+'</div>'
        : '';
      h+='<div class="det-item"><span class="det-ref">'+it.Ref+'</span><div style="flex:1"><div class="det-desc">'+it.Descricao+'</div>'+flagHtml+(it.Observacao?'<div class="det-obs">'+it.Observacao+'</div>':'');
      fotos.forEach(function(u,fi){ h+='<a class="det-foto-link" href="'+u.trim()+'" target="_blank">Foto '+(fi+1)+'</a>'; });
      h+='</div><span class="det-status '+stCls+'">'+stLbl+'</span></div>';
    });
    h+='</div>';
  });
  });
  if(pecas&&pecas.length){
    h+='<div class="det-section"><div class="det-sec-hdr">PECAS REMOVIDAS</div>';
    pecas.forEach(function(pc){
      var pfUrls=(pc.Foto||'').split('|').filter(function(u){ return u.trim(); });
      h+='<div class="det-item"><div style="flex:1"><div class="det-desc">'+(pc.Descricao_Item||'')+'</div>'+(pc.Observacao?'<div class="det-obs">'+pc.Observacao+'</div>':'');
      pfUrls.forEach(function(u,fi){ h+='<a class="det-foto-link" href="'+u.trim()+'" target="_blank">Foto '+(fi+1)+'</a>'; });
      h+='</div></div>';
    });
    h+='</div>';
  }
  p.innerHTML=h; uiTop('DETALHES','',c.Placa||'-');
}

function setSt(btn){
  var kk=btn.dataset.k,v=btn.dataset.v,cc=ST.chk[kk];
  cc.st=cc.st===v?null:v; if(cc.st!=='desmontado') cc.flag=null;
  btn.closest('.sbr').querySelectorAll('.sb').forEach(function(b){ b.className='sb'; if(b.dataset.v==='montado'&&cc.st==='montado') b.className='sb mont'; if(b.dataset.v==='desmontado'&&cc.st==='desmontado') b.className='sb desm'; });
  document.getElementById('cd-'+kk).className='itm '+(cc.st||'');
  document.getElementById('dt-'+kk).className='idot '+(cc.st||'');
  var ex=document.getElementById('ex-'+kk); if(cc.st==='desmontado') ex.classList.add('open'); else ex.classList.remove('open');
  var sec=kk.split('_')[0],its=CAT.filter(function(i){ return i.s===sec; }),dn=its.filter(function(i){ return ST.chk[ky(i)].st; }).length;
  var sp=document.getElementById('sp'); if(sp) sp.textContent=dn+'/'+its.length;
  uiSync();
}
function setFlag(kk, tipo){
  var cc=ST.chk[kk]; cc.flag = cc.flag===tipo ? null : tipo;
  var fr=document.getElementById('fr-'+kk); if(!fr) return;
  fr.querySelectorAll('.flag-btn').forEach(function(b){ b.className='flag-btn '+b.dataset.tipo+(cc.flag===b.dataset.tipo?' on':''); });
}
function compress(file,cb){ var r=new FileReader(); r.onload=function(e){ var img=new Image(); img.onload=function(){ var M=900,w=img.width,h=img.height; if(w>M){h=h*M/w;w=M;} if(h>M){w=w*M/h;h=M;} var cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h); cb(cv.toDataURL('image/jpeg',.75)); }; img.src=e.target.result; }; r.readAsDataURL(file); }
function addFotoItem(kk,inp){ if(!inp.files||!inp.files[0]) return; var cc=ST.chk[kk]; if(cc.fotos.length>=MAX_FOTOS) return; compress(inp.files[0],function(b64){ cc.fotos.push(b64); renderFotos(kk); }); }
function delFotoItem(kk,idx){ ST.chk[kk].fotos.splice(idx,1); renderFotos(kk); }

// ── PECAS REMOVIDAS ──────────────────────────────────────────────────────────
function renderFotosPeca(i){
  var pec=ST.pecas[i], wrap=document.getElementById('pfw-'+i); if(!wrap) return;
  var fotos=pec.fotos||[], html='';
  fotos.forEach(function(b64,fi){ html+='<div class="foto-thumb-wrap"><img class="foto-thumb" src="'+b64+'"><button class="foto-del-btn" onclick="dFotoP('+i+','+fi+')">&#x2715;</button></div>'; });
  if(fotos.length<MAX_FOTOS_PECA){ html+='<button class="foto-add-btn" onclick="document.getElementById(\'pfi-'+i+'\').click()">&#x1F4F7; Foto '+(fotos.length+1)+'/'+MAX_FOTOS_PECA+'</button><input type="file" id="pfi-'+i+'" accept="image/*" capture="environment" onchange="hFotoP('+i+',this)">'; }
  wrap.innerHTML=html;
}
function rPecas(p){
  var hdr=document.createElement('div'); hdr.className='shdr';
  hdr.innerHTML='<span class="shn">5/5</span><span class="sht">Pecas Removidas</span>';
  p.appendChild(hdr);
  var lbls=[
    'Caixas dentro do carro com pecas desmontadas (identificar com a placa e lacrar)',
    'Pecas removidas fora do carro (identificadas com etiqueta e armazenadas adequadamente)'
  ];
  lbls.forEach(function(lbl,i){
    var pec=ST.pecas[i], d=document.createElement('div'); d.className='pc';
    d.innerHTML='<div class="pn">Item '+(i+1)+'</div>'
      +'<div class="pd">'+lbl+'</div>'
      +'<textarea rows="2" placeholder="Descrever aqui..." oninput="ST.pecas['+i+'].o=this.value">'+(pec.o||'')+'</textarea>'
      +'<div class="fotos-wrap" id="pfw-'+i+'"></div>';
    p.appendChild(d);
    renderFotosPeca(i);
  });
}
function hFotoP(i,inp){ if(!inp.files||!inp.files[0]) return; if(!ST.pecas[i].fotos) ST.pecas[i].fotos=[]; if(ST.pecas[i].fotos.length>=MAX_FOTOS_PECA) return; compress(inp.files[0],function(b){ ST.pecas[i].fotos.push(b); renderFotosPeca(i); }); }
function dFotoP(i,idx){ ST.pecas[i].fotos.splice(idx,1); renderFotosPeca(i); }

// ── RESUMO ───────────────────────────────────────────────────────────────────
function toggleComplemento(){
  ST.complemento=!ST.complemento;
  var t=document.getElementById('comp-toggle'), c=document.getElementById('comp-check');
  if(t) t.className='comp-toggle'+(ST.complemento?' on':'');
  if(c) c.innerHTML=ST.complemento?'&#x2713;':'';
}
function rResumo(p){
  var mo=[],de=[],troca=[],rec=[],celula=[],pend=[];
  CAT.forEach(function(i){ var cc=ST.chk[ky(i)]; if(cc.st==='montado') mo.push(i); else if(cc.st==='desmontado'){ de.push(i); if(cc.flag==='troca') troca.push(i); else if(cc.flag==='recuperacao') rec.push(i); else if(cc.flag==='celula') celula.push(i); }else pend.push(i); });
  var flagCount = troca.length + rec.length + celula.length;
  var h='<div class="s4">'
    +'<div class="sbox"><div class="snum t">'+CAT.length+'</div><div class="slbl">Total</div></div>'
    +'<div class="sbox"><div class="snum mo">'+mo.length+'</div><div class="slbl">Nao desm.</div></div>'
    +'<div class="sbox"><div class="snum de">'+de.length+'</div><div class="slbl">Desmontado</div></div>'
    +'<div class="sbox"><div class="snum re">'+flagCount+'</div><div class="slbl">Com flag</div></div>'
  +'</div>';
  if(pend.length>0) h+='<div class="wn">'+pend.length+' item(ns) sem avaliacao.</div>';
  h+='<div class="comp-toggle'+(ST.complemento?' on':'')+'" id="comp-toggle" onclick="toggleComplemento()">'
    +'<span class="comp-icon">&#x1F527;</span>'
    +'<div class="comp-text"><div class="comp-title">Esse carro teve complemento?</div><div class="comp-sub">Toque para marcar/desmarcar</div></div>'
    +'<div class="comp-check" id="comp-check">'+(ST.complemento?'&#x2713;':'')+'</div>'
  +'</div>';
  h+='<div class="ib"><div class="ir"><span class="ik">Placa</span><span class="iv pv">'+(ST.placa||'-').toUpperCase()+'</span></div><div class="ir"><span class="ik">Data</span><span class="iv">'+(ST.data?ST.data.split('-').reverse().join('/'):'-')+'</span></div><div class="ir"><span class="ik">Tecnico</span><span class="iv">'+(ST.td||'-')+'</span></div></div>';
  var flagLabels = {troca:'&#x1F504; Troca',recuperacao:'&#x1F9F0; Recuperacao',celula:'&#x1F3ED; Celula'};
  [['troca',troca],['recuperacao',rec],['celula',celula]].forEach(function(pair){
    var tipo=pair[0], lista=pair[1];
    if(!lista.length) return;
    h+='<div class="res-sec"><div class="res-sec-title">'+flagLabels[tipo]+' <span class="res-badge re">'+lista.length+'</span></div>';
    lista.forEach(function(it){ h+='<div class="res-item"><div class="res-dot re"></div><div><div class="res-sec2">'+it.s+' &middot; '+it.r+'</div><div class="res-desc">'+it.d+'</div></div></div>'; });
    h+='</div>';
  });
  if(de.length>0){ h+='<div class="res-sec"><div class="res-sec-title">Desmontadas <span class="res-badge de">'+de.length+'</span></div>'; de.forEach(function(it){ var cc=ST.chk[ky(it)]; h+='<div class="res-item"><div class="res-dot de"></div><div><div class="res-sec2">'+it.s+' &middot; '+it.r+'</div><div class="res-desc">'+it.d+'</div>'+(cc.o?'<div style="font-size:12px;color:#888;font-style:italic;margin-top:2px">'+cc.o+'</div>':'')+'<div style="font-size:11px;color:#888;margin-top:2px">'+cc.fotos.length+' foto(s)</div></div></div>'; }); h+='</div>'; }
  if(mo.length>0){ h+='<div class="res-sec"><div class="res-sec-title">Nao desmontadas <span class="res-badge mo">'+mo.length+'</span></div>'; mo.forEach(function(it){ h+='<div class="res-item"><div class="res-dot mo"></div><div><div class="res-sec2">'+it.s+' &middot; '+it.r+'</div><div class="res-desc">'+it.d+'</div></div></div>'; }); h+='</div>'; }
  p.innerHTML=h;
}

// ── NAVEGACAO ────────────────────────────────────────────────────────────────
function goNext(){
  var s=STEPS[ST.step];
  if(s==='hdr'){ if(!ST.placa||!ST.data||!ST.td){ mostrarModal('Preencha a Placa, a Data e confirme o Tecnico.','&#x1F4CB;'); return; } }
  if(SECS.indexOf(s)>=0){
    var its=CAT.filter(function(i){ return i.s===s; });
    var pending=its.filter(function(i){ return !ST.chk[ky(i)].st; });
    function prosseguirSecao(){
      // Em modo de edição as fotos já estão no banco — não valida
      if(!ST._editId){
        var semFoto=its.filter(function(i){ var cc=ST.chk[ky(i)]; return cc.st==='desmontado'&&cc.fotos.length===0; });
        if(semFoto.length>0){
          semFoto.forEach(function(it){ var fo=document.getElementById('fo-'+ky(it)); if(fo) fo.classList.add('show'); });
          var first=document.getElementById('cd-'+ky(semFoto[0])); if(first) first.scrollIntoView({behavior:'smooth',block:'center'});
          mostrarModal('Registre pelo menos 1 foto para cada item desmontado. ('+semFoto.length+' pendente(s))','&#x1F4F7;');
          return;
        }
      }
      ST.step++; render();
    }
    if(pending.length===its.length){
      mostrarConfirmacao('Nenhum item foi avaliado nesta secao.\nConfirma que nenhum foi desmontado?','&#x2753;',function(){
        its.forEach(function(it){ ST.chk[ky(it)].st='montado'; });
        prosseguirSecao();
      });
      return;
    }
    if(pending.length>0){
      mostrarConfirmacao(pending.length+' item(ns) ainda sem avaliacao.\nOs itens pendentes nao foram desmontados?','&#x26A0;&#xFE0F;',function(){
        pending.forEach(function(it){ ST.chk[ky(it)].st='montado'; });
        prosseguirSecao();
      });
      return;
    }
    prosseguirSecao();
    return;
  }
  if(s==='resumo'){ if(ST._editId) salvarEdicao(); else enviar(); return; }
  ST.step++; render();
}
function goBack(){ if(ST.step===0){ ST.mode='home'; render(); return; } ST.step--; render(); }

// ── ENVIAR ───────────────────────────────────────────────────────────────────
var PECAS_LABELS = [
  'Caixas dentro do carro com pecas desmontadas (identificar com a placa e lacrar)',
  'Pecas removidas fora do carro (identificadas com etiqueta e armazenadas adequadamente)'
];

function loading(msg){ document.getElementById('ls').classList.add('on'); document.getElementById('lm').textContent=msg||'Salvando...'; }
function loadingOff(){ document.getElementById('ls').classList.remove('on'); }

function enviar(){
  (async function(){
    try {
      loading('Buscando tecnico...');

      var tecs = await sbSelect('tecnicos', 'select=id&nome=eq.'+encodeURIComponent(ST.td));
      if(!tecs||!tecs[0]) throw new Error('Tecnico nao encontrado: '+ST.td);
      var tecId = tecs[0].id;

      loading('Criando registro...');
      var cl = await sbInsert('checklists', {
        placa: ST.placa,
        data: ST.data,
        tecnico_id: tecId,
        tem_complemento: ST.complemento || false
      });

      // Inserir itens do checklist
      for(var idx=0; idx<CAT.length; idx++){
        var it = CAT[idx];
        var cc = ST.chk[ky(it)];
        loading('Salvando itens... ('+(idx+1)+'/'+CAT.length+')');

        var item = await sbInsert('checklist_itens', {
          checklist_id: cl.id,
          zona: it.s,
          item: it.d,
          situacao: cc.st==='montado' ? 'ok' : cc.st==='desmontado' ? 'nao_ok' : null,
          desmontado: cc.st==='desmontado',
          recuperacao: cc.flag === 'recuperacao',
          tipo_flag: cc.flag || null,
          observacao: cc.o || null
        });

        for(var fi=0; fi<(cc.fotos||[]).length; fi++){
          loading('Enviando foto '+(fi+1)+' de '+it.d+'...');
          var path = cl.id+'/'+item.id+'/'+fi+'.jpg';
          var fResult = await uploadFoto(cc.fotos[fi], path);
          await sbInsert('checklist_fotos', { item_id: item.id, storage_path: fResult.storagePath, url: fResult.url });
        }
      }

      // Inserir pecas removidas
      for(var pi=0; pi<ST.pecas.length; pi++){
        var pec = ST.pecas[pi];
        loading('Salvando peca '+(pi+1)+'...');
        var pitem = await sbInsert('checklist_itens', {
          checklist_id: cl.id,
          zona: 'Pecas',
          item: PECAS_LABELS[pi],
          observacao: pec.o || null
        });

        for(var pfi=0; pfi<(pec.fotos||[]).length; pfi++){
          loading('Enviando foto da peca '+(pi+1)+'...');
          var pPath = cl.id+'/'+pitem.id+'/'+pfi+'.jpg';
          var pfResult = await uploadFoto(pec.fotos[pfi], pPath);
          await sbInsert('checklist_fotos', { item_id: pitem.id, storage_path: pfResult.storagePath, url: pfResult.url });
        }
      }

      loadingOff();
      sucesso(cl.id);

    } catch(e) {
      loadingOff();
      mostrarModal('Erro ao salvar: '+e.message, '&#x274C;');
    }
  })();
}

function sucesso(id){
  setNav(false);
  _ultimoChecklist = null; // reset — o próximo login verifica de novo
  document.getElementById('pg').innerHTML='<div class="sw"><div class="si">&#x2705;</div><div class="st">Checklist enviado!</div><div class="ss">Dados salvos no banco e fotos no Supabase Storage.</div><div class="sid">ID: '+id+'</div><button class="snw" onclick="voltarHome()">Voltar ao inicio</button></div>';
  uiTop('CONCLUIDO','','');
  verificarUltimoChecklist();
}

// ── EDITAR ULTIMO CHECKLIST ──────────────────────────────────────────────────
function iniciarEdicao(){
  if(!_ultimoChecklist) return;
  carregarParaEditar(_ultimoChecklist.id);
}

async function carregarParaEditar(clId){
  loading('Carregando checklist...');
  try {
    var cls = await sbSelect('checklists', 'select=*&id=eq.'+clId);
    var cl  = cls && cls[0];
    if(!cl){ loadingOff(); mostrarModal('Checklist nao encontrado.','&#x274C;'); return; }

    var itens = await sbSelect('checklist_itens',
      'select=id,zona,item,situacao,desmontado,recuperacao,tipo_flag,observacao&checklist_id=eq.'+clId+'&zona=neq.Pecas');

    loadingOff();

    ST._editId    = clId;
    ST.mode       = 'checklist';
    ST.step       = 0;
    ST.placa      = cl.placa;
    ST.data       = cl.data;
    ST.td         = _tecnico ? _tecnico.nome : cl.tecnico_id;
    ST.complemento= cl.tem_complemento || false;
    ST.pecas      = [{o:'',fotos:[]},{o:'',fotos:[]}];

    CAT.forEach(function(i){ ST.chk[ky(i)]={st:null,flag:null,o:'',fotos:[],dbId:null}; });

    (itens||[]).forEach(function(it){
      var cat = CAT.find(function(c){ return c.s===it.zona && c.d===it.item; });
      if(!cat) return;
      var kk = ky(cat);
      ST.chk[kk].st    = it.desmontado ? 'desmontado' : 'montado';
      ST.chk[kk].flag  = it.tipo_flag || (it.recuperacao ? 'recuperacao' : null);
      ST.chk[kk].o     = it.observacao || '';
      ST.chk[kk].dbId  = it.id;
    });

    render();
  } catch(e) {
    loadingOff();
    mostrarModal('Erro ao carregar: '+e.message,'&#x274C;');
  }
}

async function salvarEdicao(){
  loading('Atualizando checklist...');
  try {
    // Atualiza o header do checklist
    await sbUpdate('checklists', ST._editId, {
      placa: ST.placa,
      data: ST.data,
      tem_complemento: ST.complemento || false,
      editado: true
    });

    // Atualiza cada item
    for(var idx=0; idx<CAT.length; idx++){
      var it = CAT[idx];
      var cc = ST.chk[ky(it)];
      if(!cc.dbId) continue;
      loading('Atualizando itens... ('+(idx+1)+'/'+CAT.length+')');
      await sbUpdate('checklist_itens', cc.dbId, {
        situacao: cc.st==='montado' ? 'ok' : cc.st==='desmontado' ? 'nao_ok' : null,
        desmontado: cc.st==='desmontado',
        recuperacao: cc.flag === 'recuperacao',
        tipo_flag: cc.flag || null,
        observacao: cc.o || null
      });
      // Upload de novas fotos (se houver)
      for(var fi=0; fi<(cc.fotos||[]).length; fi++){
        loading('Enviando foto adicional...');
        var path = ST._editId+'/'+cc.dbId+'/edit_'+Date.now()+'_'+fi+'.jpg';
        var fResult = await uploadFoto(cc.fotos[fi], path);
        await sbInsert('checklist_fotos', { item_id: cc.dbId, storage_path: fResult.storagePath, url: fResult.url });
      }
    }

    _ultimoChecklist = null;
    loadingOff();
    var savedId = ST._editId;
    ST._editId = null;
    sucesso(savedId);
  } catch(e) {
    loadingOff();
    mostrarModal('Erro ao atualizar: '+e.message,'&#x274C;');
  }
}

// Oculta app até autenticar
document.getElementById('sa').style.display = 'none';
document.getElementById('topbar-content').style.display = 'none';
document.getElementById('logout-area').style.display = 'none';
iniciarSessao();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>
